    :root {
      --theme-color: #ff6b6b;
    }
    .sidebar-nav > a {

    }
    .markdown-section {
      max-width: 900px;
    }

</head>
<body>

      }
    }

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
